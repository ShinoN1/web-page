<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div id="login-container" class="login-wrapper">
        <div class="login-box">
            <h2><i class="fas fa-user-graduate"></i> Student Plan</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuario" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        
        <nav class="main-nav">
            <div class="nav-top">
                <button class="nav-btn active" onclick="switchView('schedule')" title="Horario">
                    <i class="fas fa-calendar-alt"></i>
                </button>
                <button class="nav-btn" onclick="switchView('tasks')" title="Tareas">
                    <i class="fas fa-tasks"></i>
                </button>
            </div>
            <div class="nav-bottom">
                <button class="nav-btn theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Modo Oscuro">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="nav-btn logout" id="logout-btn" title="Salir">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>

        <div class="content-area">
            
            <section id="view-schedule" class="view-section active-view">
                <div class="schedule-wrapper">
                    
                    <aside class="sidebar-palette">
                        <h3>Materias</h3>
                        
                        <div class="add-subject-box">
                            <input type="text" id="new-subject-name" placeholder="Nueva materia...">
                            <div class="color-picker-wrapper">
                                <input type="color" id="subject-color" value="#5eead4" title="Elige color">
                            </div>
                            <button onclick="createDraggableSubject()" class="add-btn"><i class="fas fa-plus"></i></button>
                        </div>
                        
                        <div id="draggable-container" class="draggable-pool"></div>

                        <div class="config-days-box">
                            <h4>Días Visibles</h4>
                            <label class="day-toggle">
                                <span>Sábado</span>
                                <input type="checkbox" id="check-sat" onchange="toggleWeekend()">
                                <span class="toggle-slider"></span>
                            </label>
                            <label class="day-toggle">
                                <span>Domingo</span>
                                <input type="checkbox" id="check-sun" onchange="toggleWeekend()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <div class="trash-zone" ondrop="deleteDroppedItem(event)" ondragover="allowDrop(event)">
                            <i class="fas fa-trash"></i> Arrastra aquí para eliminar
                        </div>
                    </aside>

                    <div class="schedule-grid-wrapper">
                        <div class="grid-header-row">
                            </div>
                        <div id="main-grid" class="main-grid"></div>
                    </div>
                </div>
            </section>

            <section id="view-tasks" class="view-section hidden-view">
                <div class="tasks-container">
                    <header class="tasks-header">
                        <h2>Mis Tareas</h2>
                        <div class="input-group">
                            <input type="text" id="task-desc" placeholder="Descripción...">
                            <input type="datetime-local" id="task-deadline">
                            <button onclick="addTask()">Agregar</button>
                        </div>
                    </header>
                    <ul id="task-list" class="task-list"></ul>
                </div>
            </section>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
